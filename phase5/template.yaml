# AWS SAM 배포 설정
# 배포: sam build && sam deploy --guided
# 로컬: sam local start-api

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SmartHome Ops Agent - AI 운영 자동화

Globals:
  Function:
    Runtime: python3.11
    Timeout: 300          # 에이전트는 시간이 걸림
    MemorySize: 1024
    Environment:
      Variables:
        ANTHROPIC_API_KEY: !Sub '{{resolve:secretsmanager:smarthome/api-keys:SecretString:anthropic_key}}'
        SLACK_BOT_TOKEN:   !Sub '{{resolve:secretsmanager:smarthome/api-keys:SecretString:slack_token}}'
        S3_BUCKET:         !Ref DataBucket
        SQS_QUEUE_URL:     !Ref DeviceEventQueue

Resources:

  # ── Lambda 함수 ────────────────────────────────────────────────────
  SmarthomeAgent:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../          # 프로젝트 루트
      Handler: phase5/01_lambda_function.lambda_handler
      Description: "스마트홈 운영 AI 에이전트"
      Events:
        # HTTP API (Slack Webhook 등)
        ApiEvent:
          Type: Api
          Properties:
            Path: /agent
            Method: post
        # SQS 자동 처리
        SqsEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt DeviceEventQueue.Arn
            BatchSize: 5

  # ── SQS 큐 ────────────────────────────────────────────────────────
  DeviceEventQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: smarthome-device-events
      VisibilityTimeout: 360    # Lambda 타임아웃보다 길게
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
        maxReceiveCount: 3

  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: smarthome-device-events-dlq

  # ── S3 버킷 ───────────────────────────────────────────────────────
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub smarthome-ai-data-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90    # 90일 후 자동 삭제

  # ── IAM 역할 (Lambda 권한) ─────────────────────────────────────────
  AgentRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SmarthomeAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:ListBucket]
                Resource: [!GetAtt DataBucket.Arn, !Sub "${DataBucket.Arn}/*"]
              - Effect: Allow
                Action: [sqs:ReceiveMessage, sqs:DeleteMessage, sqs:SendMessage, sqs:GetQueueAttributes]
                Resource: !GetAtt DeviceEventQueue.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:smarthome/*

Outputs:
  ApiUrl:
    Description: "에이전트 API Gateway URL"
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/agent

  QueueUrl:
    Description: "SQS 큐 URL"
    Value: !Ref DeviceEventQueue
